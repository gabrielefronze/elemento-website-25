name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh blog SEO and RSS artifacts
        run: python3 generate_blog_posts.py --refresh-blog-seo

      - name: Install dependencies
        run: npm ci

      - name: Set Astro base path for GitHub Pages
        run: |
          if [ -n "${ASTRO_BASE}" ]; then
            echo "ASTRO_BASE=${ASTRO_BASE}" >> "$GITHUB_ENV"
          elif [ -f CNAME ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_BASE=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build static site
        run: npm run build
        env:
          ASTRO_BASE: ${{ env.ASTRO_BASE }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
